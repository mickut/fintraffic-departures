name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Validate version matches tag
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  python - <<'PY'
                  import json
                  import os
                  from pathlib import Path

                  manifest = json.loads(Path('custom_components/transit_departures/manifest.json').read_text(encoding='utf-8'))
                  tag = os.environ['GITHUB_REF_NAME']
                  expected = tag.removeprefix('v')
                  actual = manifest['version']

                  if actual != expected:
                      raise SystemExit(f'manifest version {actual!r} does not match tag {tag!r}')

                  print(f'Version {actual} matches tag {tag}.')
                  PY

            - name: Build release archive
              run: |
                  python - <<'PY'
                  from pathlib import Path
                  from zipfile import ZIP_DEFLATED, ZipFile

                  root = Path('.')
                  source_root = root / 'custom_components' / 'transit_departures'
                  archive_path = root / 'transit_departures.zip'

                  with ZipFile(archive_path, 'w', compression=ZIP_DEFLATED) as archive:
                      for file_path in source_root.rglob('*'):
                          if file_path.is_file():
                              archive.write(file_path, file_path.relative_to(root))

                  print(f'Created {archive_path}')
                  PY

            - name: Create GitHub release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: transit_departures.zip
