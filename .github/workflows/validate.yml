name: Validate

on:
    push:
    pull_request:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

permissions: {}

jobs:
    validate-hacs:
        runs-on: ubuntu-latest
        steps:
            - name: HACS validation
              uses: hacs/action@main
              with:
                  category: integration

    validate-python:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Validate JSON metadata
              run: |
                  python - <<'PY'
                  import json
                  from pathlib import Path

                  root = Path('.')
                  files = [
                      root / 'hacs.json',
                      root / 'custom_components' / 'transit_departures' / 'manifest.json',
                      root / 'custom_components' / 'transit_departures' / 'strings.json',
                  ]

                  for file_path in files:
                      with file_path.open('r', encoding='utf-8') as handle:
                          json.load(handle)

                  manifest = json.loads((root / 'custom_components' / 'transit_departures' / 'manifest.json').read_text(encoding='utf-8'))
                  assert manifest['domain'] == 'transit_departures'
                  assert manifest['config_flow'] is True
                  assert isinstance(manifest['version'], str) and manifest['version']
                  print('Metadata validation passed.')
                  PY

            - name: Compile Python sources
              run: python -m compileall custom_components

    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Install test dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install "homeassistant>=2026.5.0" "pytest>=8.2.0" "pytest-asyncio>=0.23.0" "pytest-socket>=0.7.0"

            - name: Run unit tests
              run: python -m pytest -o addopts=''
