name: Release Drafter

on:
    push:
        branches:
            - main
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - edited
            - closed

permissions:
    contents: write
    pull-requests: write

jobs:
    update-release-draft:
        runs-on: ubuntu-latest

        steps:
            - name: Update release draft
              uses: release-drafter/release-drafter@v7.3.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
